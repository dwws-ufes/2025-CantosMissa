<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:jsf="http://xmlns.jcp.org/jsf"
        xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
        xmlns:p="http://primefaces.org/ui"
        xmlns:adm="http://github.com/adminfaces"
        template="/WEB-INF/templates/template.xhtml">

    <ui:define name="title">
        <h:outputText value="#{msgsCore['registrationMusic.title']}" />
    </ui:define>

    <ui:define name="description">
        <h:outputText value="#{msgsCore['registrationMusic.title.description']}" />
    </ui:define>

    <ui:define name="body">
        <adm:breadcrumb link="/core/registrationMusic/index" title="#{msgsCore['registrationMusic.title']}" />

        <h:form id="form">
            <p:panel header="#{msgsCore['registrationMusic.text.entities']}" styleClass="card no-border">
                <p:dataTable id="dt-music" widgetVar="dtMusic" var="music" value="#{musicRegistrationController.entities}" emptyMessage="#{msgsCore['registrationMusic.text.emptyMessage']}" reflow="true" selection="#{musicRegistrationController.selectedEntities}" rowKey="#{music.id}" paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                    <p:ajax event="filter" ignoreAutoUpdate="true" />
                    <f:facet name="footer">
                        <div style="float: right; margin-top: -40px;">
                            <p:commandButton value="#{msgs['jbutler.crud.button.create']}" icon="pi pi-plus" actionListener="#{musicRegistrationController.openNew}" update=":form:manage-entity-content" oncomplete="PF('formDialog').show()" style="margin-right: .5rem">
                                <p:resetInput target=":form:manage-entity-content" />
                            </p:commandButton>
                            <p:commandButton id="delete-entities-button" value="#{msgs['jbutler.crud.button.delete']}" icon="pi pi-trash" actionListener="#{musicRegistrationController.deleteSelectedEntities}" disabled="#{!musicRegistrationController.hasSelectedEntities()}" update="@this">
                                <p:confirm header="#{msgs['jbutler.crud.title.confirmation']}" message="#{msgsCore['registrationMusic.text.deleteConfirmation']}" icon="pi pi-exclamation-triangle" />
                            </p:commandButton>
                        </div>
                    </f:facet>

                    <p:ajax event="rowSelect" update="delete-entities-button" />
                    <p:ajax event="rowUnselect" update="delete-entities-button" />
                    <p:ajax event="rowSelectCheckbox" update="delete-entities-button" />
                    <p:ajax event="rowUnselectCheckbox" update="delete-entities-button" />
                    <p:ajax event="toggleSelect" update="delete-entities-button" />

                    <p:column width="40" selectionMode="multiple" exportable="false"></p:column>

                    <p:column headerText="#{msgsCore['registrationMusic.field.title']}" sortBy="#{music.title}" filterBy="#{music.title}" filterStyle="display: none">
                        <h:outputText value="#{music.title}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['registrationMusic.field.artist']}" sortBy="#{music.artist}" filterBy="#{music.artist}" filterStyle="display: none">
                        <h:outputText value="#{music.artist}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['registrationMusic.field.chords']}" sortBy="#{music.chords}" filterBy="#{music.chords}" filterStyle="display: none">
                        <h:outputText value="#{music.chords}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['registrationMusic.field.musicKey']}" sortBy="#{music.musicKey}" filterBy="#{music.musicKey}" filterStyle="display: none">
                        <h:outputText value="#{music.musicKey}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['registrationMusic.field.season']}" sortBy="#{music.season}" filterBy="#{music.season}" filterStyle="display: none">
                        <h:outputText value="#{music.season}" />
                    </p:column>
                    <p:column headerText="#{msgsCore['registrationMusic.field.type']}" sortBy="#{music.type}" filterBy="#{music.type}" filterStyle="display: none">
                        <h:outputText value="#{music.type}" />
                    </p:column>

                    <p:column exportable="false" style="text-align: center;">
                        <f:facet name="header">
                            <i class="pi pi-search"></i>
                            <p:inputText id="globalFilter" onkeyup="PF('dtMusic').filter()" placeholder="#{msgs['jbutler.crud.text.search']}" style="margin-left: 10px;" />
                        </f:facet>
                        <p:commandButton icon="pi pi-pencil" update=":form:manage-entity-content" oncomplete="PF('formDialog').show()" process="@this">
                            <f:setPropertyActionListener value="#{music}" target="#{musicRegistrationController.selectedEntity}" />
                            <p:resetInput target=":form:manage-entity-content" />
                        </p:commandButton>
                        <p:commandButton icon="pi pi-trash" process="@this" oncomplete="PF('deleteEntityDialog').show()">
                            <f:setPropertyActionListener value="#{music}" target="#{musicRegistrationController.selectedEntity}" />
                        </p:commandButton>
                    </p:column>
                </p:dataTable>
            </p:panel>

            <p:dialog header="#{msgsCore['registrationMusic.title.detail']}" showEffect="fade" widgetVar="formDialog" responsive="true" width="450" modal="true">
                <p:outputPanel id="manage-entity-content">
                    <p:outputPanel rendered="#{not empty musicRegistrationController.selectedEntity}">
                        <p:panelGrid columns="2" cellpadding="5" layout="grid" styleClass="ui-fluid card" columnClasses="ui-grid-col-4,ui-grid-col-8">
                            <p:outputLabel for="titleField" value="#{msgsCore['registrationMusic.field.title']}" />
                            <h:panelGroup id="titleGroup">
                                <p:message id="titleMsgs" for="titleField" />
                                <p:inputText id="titleField" value="#{musicRegistrationController.selectedEntity.title}" required="true">
                                    <p:ajax event="blur" process="@this" update="titleMsgs" />
                                </p:inputText>
                            </h:panelGroup>

                            <p:outputLabel for="artistField" value="#{msgsCore['registrationMusic.field.artist']}" />
                            <h:panelGroup id="artistGroup">
                                <p:message id="artistMsgs" for="artistField" />
                                <p:inputText id="artistField" value="#{musicRegistrationController.selectedEntity.artist}" required="true">
                                    <p:ajax event="blur" process="@this" update="artistMsgs" />
                                </p:inputText>
                            </h:panelGroup>

                            <p:outputLabel for="chordsField" value="#{msgsCore['registrationMusic.field.chords']}" />
                            <h:panelGroup id="chordsGroup">
                                <p:message id="chordsMsgs" for="chordsField" />
                                <p:inputText id="chordsField" value="#{musicRegistrationController.selectedEntity.chords}" required="true">
                                    <p:ajax event="blur" process="@this" update="chordsMsgs" />
                                </p:inputText>
                            </h:panelGroup>

                            <p:outputLabel for="keyField" value="#{msgsCore['registrationMusic.field.musicKey']}" />
                            <h:panelGroup id="keyGroup">
                                <p:message id="keyMsgs" for="keyField" />
                                <p:inputText id="keyField" value="#{musicRegistrationController.selectedEntity.key}" required="true">
                                    <p:ajax event="blur" process="@this" update="keyMsgs" />
                                </p:inputText>
                            </h:panelGroup>
                        </p:panelGrid>
                    </p:outputPanel>
                </p:outputPanel>

                <f:facet name="footer">
                    <p:commandButton id="saveButton" value="#{msgs['jbutler.crud.button.save']}" icon="pi pi-check" actionListener="#{musicRegistrationController.save}" update="manage-entity-content" process="manage-entity-content @this" oncomplete="if(!args.validationError) PF('formDialog').hide()" />
                    <p:commandButton value="#{msgs['jbutler.crud.button.cancel']}" icon="pi pi-times" onclick="PF('formDialog').hide()" />
                    <p:defaultCommand target="saveButton" />
                </f:facet>
            </p:dialog>

            <p:confirmDialog widgetVar="deleteEntityDialog" showEffect="fade" width="300" message="#{msgsCore['registrationMusic.text.deleteConfirmation']}" header="#{msgs['jbutler.crud.title.confirmation']}" severity="warn">
                <p:commandButton value="#{msgs['jbutler.crud.button.yes']}" icon="pi pi-check" actionListener="#{musicRegistrationController.delete}" process="@this" oncomplete="PF('deleteEntityDialog').hide()" />
                <p:commandButton value="#{msgs['jbutler.crud.button.no']}" type="button" icon="pi pi-times" onclick="PF('deleteEntityDialog').hide()" />
            </p:confirmDialog>

            <p:confirmDialog global="true" showEffect="fade" width="300">
                <p:commandButton value="#{msgs['jbutler.crud.button.no']}" type="button" icon="pi pi-times" styleClass="ui-confirmdialog-no" />
                <p:commandButton value="#{msgs['jbutler.crud.button.yes']}" type="button" icon="pi pi-check" styleClass="ui-confirmdialog-yes" />
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
